server:
  port: 8085
  servlet:
    context-path: /

spring:
  application:
    name: agent-toolbox-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8085/api/v1/auth/google/callback}

token:
  encryption-key: ${TOKEN_ENCRYPTION_KEY:default-dev-key-change-in-prod-32chars!}

jwt:
  secret: ${JWT_SECRET:agent-toolbox-dev-secret-key-change-this-in-production-minimum-32-bytes}

# LLM provider: "ollama" (local) or "gemini" (cloud)
llm:
  provider: ${LLM_PROVIDER:ollama}

# Ollama (local) configuration
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.1:8b}
  temperature: 0.3
  timeout-seconds: 120

# Gemini (cloud) configuration
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  temperature: 0.3
  max-output-tokens: 4096
  timeout-seconds: 60

# Rate limiting
rate-limit:
  daily-query-limit: 50
  daily-token-budget: 500000
  ip-requests-per-hour: 100

# Circuit breaker — set to true to disable all LLM calls
circuit-breaker:
  enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
