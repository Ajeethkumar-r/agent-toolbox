agent:
  name: Agent Toolbox
  version: 0.1.0
  memory:
    max-messages: 20
llm:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.1:8b
    temperature: 0.1
    timeout-seconds: 60
storage:
  provider: local
  # local.bucket-root is optional. Resolution order:
  #   1. This config value (if set)
  #   2. AGENT_BUCKET_ROOT env var
  #   3. Default: ~/.agent-toolbox/buckets
output:
  verbosity: auto
  color: true
logging:
  level: INFO
