agent:
  name: Agent Toolbox
  version: 0.1.0
  memory:
    max-messages: 20
llm:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.1:8b
    temperature: 0.1
    timeout-seconds: 60
storage:
  provider: local
  local:
    bucket-root: ${user.home}/.agent-toolbox/buckets
output:
  verbosity: auto
  color: true
logging:
  level: INFO
