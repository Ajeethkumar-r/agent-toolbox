agent:
  name: Agent Toolbox
  version: 0.1.0
  memory:
    max-messages: 20
llm:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.1:8b
    temperature: 0.3
    timeout-seconds: 60
    health-check-timeout-seconds: 5
storage:
  provider: local
  local:
    # bucket-root is optional. Resolution order:
    #   1. This config value (if set)
    #   2. AGENT_BUCKET_ROOT env var
    #   3. Default: ~/.agent-toolbox/buckets
    file-read-limit-bytes: 4096
cache:
  enabled: true
  ttl-seconds: 30
output:
  verbosity: auto
  color: true
logging:
  level: INFO
