agent:
  name: Test Agent
  version: 0.0.1
  memory:
    max-tokens: 2000
    storage-path: /tmp/test-memory
llm:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.1:8b
    temperature: 0.1
    timeout-seconds: 30
storage:
  provider: local
  local:
    bucket-root: /tmp/test-buckets
output:
  verbosity: auto
  color: true
logging:
  level: INFO
embedding:
  provider: ollama
  ollama:
    model: nomic-embed-text
  store-path: /tmp/test-embeddings
  chunk-size: 200
  chunk-overlap: 20
  max-results: 3
  min-score: 0.3
